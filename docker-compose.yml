services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fdfed-backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 3000
      FRONTEND_URL: http://localhost:${FRONTEND_HOST_PORT:-5174}
    ports:
      - "${BACKEND_HOST_PORT:-3001}:3000"
    restart: unless-stopped
    networks:
      - fdfed-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fdfed-frontend
    environment:
      VITE_BACKEND_TARGET: http://backend:3000
    ports:
      - "${FRONTEND_HOST_PORT:-5174}:5173"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - fdfed-network

networks:
  fdfed-network:
    driver: bridge
